name: Swift Compatibility

on:
  push:
    branches: [main]
  pull_request:

jobs:
  swift-compat:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build Swift package
        run: swift build

      - name: Run Swift tests
        run: swift test
