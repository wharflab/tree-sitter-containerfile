name: Publish package on crates.io

on:
  push:
    tags:
      - "v*"
  pull_request:
    paths:
      - .github/workflows/publish_crates.yml

permissions:
  id-token: write # Required for OIDC

jobs:
  package:
    name: Publish Rust package
    runs-on: ubuntu-latest
    environment:
      name: crates
      url: https://crates.io/crates/tree-sitter-containerfile
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{vars.RUST_TOOLCHAIN || 'stable'}}
      - name: Set up tree-sitter CLI
        uses: tree-sitter/setup-action/cli@v2
      - name: Regenerate parser
        run: |
          while read -r grammar_dir; do
            pushd "$grammar_dir"
            tree-sitter generate
            popd > /dev/null
          done < <(jq -r '.grammars[].path // "."' tree-sitter.json)
      - name: Sync version from tree-sitter.json
        run: yq -i -o toml ".package.version = \"$(jq -r .metadata.version tree-sitter.json)\"" Cargo.toml

      - name: Set up registry token
        if: github.event_name != 'pull_request'
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish to crates.io
        run: cargo publish --color=always --allow-dirty --verbose ${{ github.event_name == 'pull_request' && '--dry-run' || '' }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
